<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="/static/estilo.css">
    <script src="/static/script.js"></script>
	<title>Predicción de Demanda</title>
</head>
<body>
	<font face="Comic Sans MS" size="4">
    <center>
        <div id ="Contenedor">
            <div id="Portal" style="background-color: #42C257">
                <font face="Comic Sans MS" size="6"><h2>OPTIMIZACIÓN DE INVENTARIOS</h2></div></font>
            <div id="Menu">
                <ul>
                    <li><a href="/" style="color: #42C257">INICIO</a></li>
                    <li><a href="/form" style="color: #42C257">FORMULARIO</a></li>
                    <li><a href="/nosotros" style="color: #42C257">INTEGRANTES</a></li>
                    </ul>
                </div><br>
            </div>
        </div>
		<div class="container">
			<font face="Comic Sans MS" size="6" color="#42C257"><b>Predicción de Cantidades</b><br></font>
	            <form id="predictionForm">
	                <label>Región</label>
	                <select id="region" name="region" required>
	                    {% for r in regiones %}
	                        <option value="{{ r }}">{{ r }}</option>
	                    {% endfor %}
	                </select>

	                <label>Categoría</label>
	                <select id="category" name="category" required>
	                    {% for c in categorias %}
	                        <option value="{{ c }}">{{ c }}</option>
	                    {% endfor %}
	                </select>

	                <label>Subcategoría</label>
	                <select id="sub_category" name="sub_category" required>
	                    {% for sc in sub_categorias %}
	                        <option value="{{ sc }}">{{ sc }}</option>
	                    {% endfor %}
	                </select>

	                <label>Mes</label>
	                <select id="month" name="month" required>
	                    {% for m in meses %}
	                        <option value="{{ m }}">{{ m }}</option>
	                    {% endfor %}
	                </select>

	                <label>Descuento (0-1)</label>
	                <input type="number" id="discount" name="discount" step="0.01" value="0.0" required>

	                <label>Ventas estimadas (USD)</label>
	                <input type="number" id="sales" name="sales" step="0.01" required>

	                <label>Segmento de cliente</label>
	                <select id="segment" name="segment" required>
	                    {% for s in segmentos %}
	                        <option value="{{ s }}">{{ s }}</option>
	                    {% endfor %}
	                </select>

	                <label>Tipo de envío</label>
	                <select id="ship_mode" name="ship_mode" required>
	                    {% for sm in modos_entregas %}
	                        <option value="{{ sm }}">{{ sm }}</option>
	                    {% endfor %}
	                </select>

	                <button type="submit">Predecir Cantidad</button>
	            </form>

	            <div id="result" class="result">
	                <h3>Resultado</h3>
	                <p><strong>Cantidad estimada:</strong> <span id="quantity"></span> unidades</p>
	                <p><strong>Recomendación:</strong> <span id="recommendation"></span></p>
	            </div>
	            <div id="error" class="error"></div>
	        </div>
	   </center>
    </font>
</body>
</html>
